# Reference contract for the Usage Collector REST surface. The runtime
# OpenAPI document is emitted from `OperationBuilder` calls in
# `gears/system/usage-collector/src/api/rest/routes.rs`; a CI drift-check
# diffs paths, methods, operationIds, tags, parameters, and response
# schemas against this file.

openapi: 3.1.0
info:
  title: Usage Collector API
  version: 1.1.0
  description: |
    Attributed usage-record ingestion, raw (OData) and aggregated read
    surfaces, individual record deactivation, and usage-type catalog
    lifecycle. All operations require a resolved `SecurityContext`
    supplied upstream by the platform gateway.

servers:
  - url: https://api.example.com
    description: Platform API gateway (deployment-specific).

tags:
  - name: Usage Records
    description: |
      Usage-record ingestion, raw (OData) and aggregated read surfaces,
      individual-record reads, and one-way `active → inactive` deactivation.
  - name: Usage Types
    description: Platform-global usage-type catalog lifecycle and read surfaces.

security:
  - bearerAuth: []

paths:
  /usage-collector/v1/records:
    post:
      operationId: usage_collector.create_usage_records
      tags: [Usage Records]
      summary: Ingest a batch of usage records
      description: |
        Submit up to 100 usage records for persistence. Every record
        carries an `idempotency_key` and is deduplicated per
        `(tenant_id, gts_id, idempotency_key)`. A record with
        `corrects_id` set is a counter compensation row; otherwise it is
        an ordinary usage row. Returns `200` if every record was accepted
        or deduplicated, `207 Multi-Status` if at least one record was
        rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRecordsRequest"
            examples:
              example_usage:
                summary: Ordinary usage emission
                value:
                  records:
                    - tenant_id: "11111111-1111-1111-1111-111111111111"
                      gts_id: gts.cf.core.uc.usage_record.v1~cf.mini_chat._.tokens_consumed.v1
                      value: "42"
                      created_at: "2026-05-29T12:00:00Z"
                      idempotency_key: ik-emit-usage-0001
                      resource_ref:
                        resource_id: rsc_compute_vm_001
                        resource_type: compute.vm
              example_compensation:
                summary: Counter compensation (signed-negative, with corrects_id)
                value:
                  records:
                    - tenant_id: "11111111-1111-1111-1111-111111111111"
                      gts_id: gts.cf.core.uc.usage_record.v1~cf.mini_chat._.tokens_consumed.v1
                      value: "-10"
                      created_at: "2026-05-29T12:05:00Z"
                      idempotency_key: ik-emit-compensation-0001
                      corrects_id: "01234567-89ab-cdef-0123-456789abcdef"
                      resource_ref:
                        resource_id: rsc_compute_vm_001
                        resource_type: compute.vm
      responses:
        "200":
          description: Every record accepted or deduplicated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestRecordsResponse"
        "207":
          description: |
            At least one record rejected. Inspect each per-record
            `outcome` and `error` field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestRecordsResponse"
        default:
          $ref: "#/components/responses/Problem"

    get:
      operationId: usage_collector.list_usage_records
      tags: [Usage Records]
      summary: Query raw usage records (OData, cursor-paginated)
      description: |
        Read a cursor-paginated page of raw `UsageRecord`s for a single
        usage type. `$filter` admits the fixed read-filter set plus the
        queried usage type's declared metadata keys. PDP-authorized scope
        is intersected with the user-supplied filter.
      parameters:
        - name: gts_id
          in: query
          required: true
          description: Single UsageType GTS id being queried.
          schema:
            type: string
            minLength: 1
            maxLength: 512
        - name: $filter
          in: query
          required: false
          description: |
            OData $filter. Operands: fixed set
            (`tenant_id`, `subject_id`, `subject_type`, `resource_id`,
            `resource_type`, `created_at`, `status`) plus the queried
            usage type's declared `metadata_fields` (string-valued). A
            bounded `created_at` window (at least one lower and one upper
            bound, e.g. `created_at ge … and created_at lt …`) is
            mandatory; its absence is `MISSING_TIME_WINDOW` (`400`).
          schema:
            type: string
        - name: $orderby
          in: query
          required: false
          description: |
            OData $orderby. MUST be a prefix of `(created_at, id)`.
          schema:
            type: string
        - name: $top
          in: query
          required: false
          description: Page size; server clamps to `[1, 1000]`.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
        - name: cursor
          in: query
          required: false
          description: Opaque continuation marker. Callers MUST NOT parse or modify.
          schema:
            type: string
      responses:
        "200":
          description: One page of raw usage records.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page_UsageRecord"
        default:
          $ref: "#/components/responses/Problem"

  /usage-collector/v1/records/aggregate:
    post:
      operationId: usage_collector.query_aggregated_usage_records
      tags: [Usage Records]
      summary: Query server-side aggregated usage
      description: |
        Compute a server-side aggregation (`sum`, `count`, `min`, `max`,
        `avg`) for a single usage type. Group-by is capped at 2
        dimensions; result rows bounded to 100,000. Mirrors the SDK's
        `UsageCollectorClientV1::query_aggregated_usage_records`
        signature.

        `sum` requires a counter usage type; `min`/`max`/`avg` require a gauge;
        `count` is valid for both. A mismatched op/kind pair is a `400`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AggregationRequest"
      responses:
        "200":
          description: Aggregation result for the requested usage type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregationResult"
        "400":
          description: |
            Canonical `InvalidArgument` envelope. Discrimination via
            `field_violations[0].reason`: `MISSING_TIME_WINDOW` (no bounded
            `created_at` window) or `OP_NOT_ALLOWED_FOR_KIND` (the `op` is not
            valid for the usage type's `kind` — `sum` on a gauge, or
            `min`/`max`/`avg` on a counter).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: |
            The requested `gts_id` is not registered in the usage-type
            catalog (resolved via a pre-dispatch `get_usage_type`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        default:
          $ref: "#/components/responses/Problem"

  /usage-collector/v1/records/{id}:
    parameters:
      - $ref: "#/components/parameters/RecordId"
    get:
      operationId: usage_collector.get_usage_record
      tags: [Usage Records]
      summary: Read a single usage record by id
      description: Read a single persisted usage record by its `id`.
      responses:
        "200":
          description: The persisted usage record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageRecord"
        "404":
          description: Usage record not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        default:
          $ref: "#/components/responses/Problem"

  /usage-collector/v1/records/{id}/deactivate:
    parameters:
      - $ref: "#/components/parameters/RecordId"
    post:
      operationId: usage_collector.deactivate_usage_record
      tags: [Usage Records]
      summary: Deactivate an individual usage record
      description: |
        Flip the targeted record's `status` from `active` to `inactive`
        atomically. When the target is a usage row, every active
        compensation row referencing it is flipped in the same plugin
        transaction (depth-1 cascade). Monotonic — there is no
        reactivation.
      responses:
        "204":
          description: Record transitioned from `active` to `inactive`.
        default:
          $ref: "#/components/responses/Problem"

  /usage-collector/v1/usage-types:
    get:
      operationId: usage_collector.list_usage_types
      tags: [Usage Types]
      summary: List usage types
      description: Cursor-paginated list of usage-type catalog rows in the caller's authorized scope.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Page of usage-type catalog entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageTypeList"
        default:
          $ref: "#/components/responses/Problem"
    post:
      operationId: usage_collector.create_usage_type
      tags: [Usage Types]
      summary: Register a new UsageType
      description: |
        Create a usage type in the catalog. `gts_id` MUST end with `~`
        and derive from the reserved abstract base
        `gts.cf.core.uc.usage_record.v1~`. Duplicate registration
        returns `409`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UsageType"
      responses:
        "201":
          description: UsageType registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageType"
          headers:
            Location:
              schema:
                type: string
                format: uri-reference
              description: URI of the newly registered usage type.
        "400":
          description: |
            Canonical `InvalidArgument` envelope. Discrimination via
            `context.field_violations[].field` and `.reason` (e.g.
            `INVALID_BASE_GTS_ID`,
            `INVALID_METADATA_FIELDS_EMPTY_STRING`,
            `INVALID_METADATA_FIELDS_DUPLICATE`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: |
            Canonical `AlreadyExists` envelope — `gts_id` already
            registered. Discrimination via `context.resource_type` +
            `context.resource.name`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        default:
          $ref: "#/components/responses/Problem"

  /usage-collector/v1/usage-types/{gts_id}:
    parameters:
      - $ref: "#/components/parameters/UsageTypeGtsId"
    get:
      operationId: usage_collector.get_usage_type
      tags: [Usage Types]
      summary: Look up a UsageType by gts_id
      description: Read a single catalog entry.
      responses:
        "200":
          description: UsageType catalog entry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageType"
        "404":
          description: UsageType not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        default:
          $ref: "#/components/responses/Problem"
    delete:
      operationId: usage_collector.delete_usage_type
      tags: [Usage Types]
      summary: Delete a UsageType (referentially safe)
      description: |
        Delete a catalog row. The storage plugin rejects deletion if any
        usage row still references the targeted `gts_id`
        (`ON DELETE RESTRICT`).
      responses:
        "204":
          description: UsageType deleted.
        "404":
          description: UsageType not found.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: UsageType still referenced by usage rows.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        default:
          $ref: "#/components/responses/Problem"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Platform-issued bearer JWT resolved into a `SecurityContext`
        upstream of this gear. Requests without a resolved
        `SecurityContext` fail closed.

  parameters:
    RecordId:
      name: id
      in: path
      required: true
      description: Gateway-derived `UsageRecord.id` (RFC 4122 UUID).
      schema:
        type: string
        format: uuid
    UsageTypeGtsId:
      name: gts_id
      in: path
      required: true
      description: |
        GTS semantic id of the usage type. MUST end with `~` and derive
        from `gts.cf.core.uc.usage_record.v1~`. URL-encoded as required.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    Limit:
      name: limit
      in: query
      required: false
      description: Number of items per page (1..200).
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor token. Forward-only; callers MUST NOT parse or modify.
      schema:
        type: string

  responses:
    Problem:
      description: RFC 9457 `application/problem+json` envelope.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

  schemas:
    UsageRecordStatus:
      type: string
      enum: [active, inactive]
      description: Monotonic record lifecycle marker. Only `active → inactive` is permitted.

    AggregationFunction:
      type: string
      enum: [sum, count, min, max, avg]
      description: |
        Aggregation function applied to the filtered `UsageRecord.value`
        stream. Matches the SDK's `AggregationOp` wire shape (serde
        `rename_all = "lowercase"`). `count` counts matched rows and is
        well-defined for any value shape; the others require a numeric
        `value`.

        Ops are restricted per usage kind: a counter usage type admits
        `{sum, count}`; a gauge admits `{min, max, avg, count}`. A mismatched
        `(op, kind)` pair is rejected with a `400`
        (`field_violations[0].reason="OP_NOT_ALLOWED_FOR_KIND"`) before the
        server-side aggregation runs.

    GroupByDimension:
      oneOf:
        - type: string
          enum: [tenant_id, resource_id, resource_type, subject_id, subject_type]
          description: |
            Group by a static `UsageRecord` column. `resource_id` /
            `resource_type` flatten `resource_ref`; `subject_id` /
            `subject_type` flatten `subject_ref` (records without a
            subject are excluded from the grouping).
        - type: object
          additionalProperties: false
          required: [metadata]
          description: |
            Group by the value of a single declared metadata key. The
            key MUST be a non-empty string that is a member of the
            queried usage type's `metadata_fields`.
          properties:
            metadata:
              type: string
              minLength: 1
              description: Metadata key declared on the usage type.
      description: |
        Aggregation grouping dimension. Either one of the fixed static
        columns (`tenant_id`, `resource_id`, `resource_type`,
        `subject_id`, `subject_type`) — emitted as a JSON string — or a
        single-field tagged object `{"metadata": "<key>"}` selecting a
        declared metadata key. Matches the SDK's `AggregationDimension`
        wire shape (serde `rename_all = "snake_case"` over unit and
        single-field variants).

    IngestOutcome:
      type: string
      enum: [accepted, duplicate, rejected]
      description: |
        Per-record outcome. `duplicate` means an exact-equality retry
        was silently absorbed. `rejected` means the record failed
        validation, PDP, semantics, or a same-key canonical-field
        mismatch (`IDEMPOTENCY_CONFLICT`); inspect the per-record
        `error` field.

    Timestamp:
      type: string
      format: date-time
      description: UTC instant (RFC 3339).

    UsageValue:
      type: string
      pattern: '^-?(?:0|[1-9][0-9]*)(?:\.[0-9]+)?$'
      example: "42.5"
      description: |
        Signed fixed-precision numeric measurement, wire-encoded as a JSON
        **string** (never a JSON number) so client/server number
        representations cannot round-trip through float and silently lose
        precision. The carrier type on every server surface is
        `rust_decimal::Decimal` (Postgres `NUMERIC` at rest). Sign rules
        are enforced server-side from the usage type's `kind` and the
        presence of `corrects_id` (see `UsageRecord.corrects_id`).

    AggregatedValue:
      type: string
      pattern: '^-?(?:0|[1-9][0-9]*)(?:\.[0-9]+)?$'
      example: "79228162514264337593543950400"
      description: |
        Signed **arbitrary-precision** numeric aggregation result, wire-encoded
        as a JSON **string** (never a JSON number) for the same float-round-trip
        safety as `UsageValue`. Unlike `UsageValue` (a single record's
        fixed-precision `rust_decimal::Decimal`), a `sum`/`avg` aggregate over a
        wide window can exceed `Decimal`'s ~7.9×10²⁸ ceiling, so the carrier on
        every server surface is `bigdecimal::BigDecimal` (Postgres `NUMERIC`,
        unbounded, at rest). `avg` may carry a plugin-chosen rounding scale on
        non-terminating quotients.

    IdempotencyKey:
      type: string
      minLength: 1
      maxLength: 256
      description: |
        Caller-supplied dedup key. Dedup unique is
        `(tenant_id, gts_id, idempotency_key)`.

    RecordMetadata:
      type: object
      additionalProperties:
        type: string
      description: |
        Closed key/value map. Every key MUST be a member of the
        referenced usage type's `metadata_fields`; values are strings.
        Default cap 8 KiB per record (operator-configurable). MUST NOT
        contain PII, payment data, regulated health data, or
        credentials.

    ResourceRef:
      type: object
      additionalProperties: false
      required: [resource_id, resource_type]
      description: Caller-supplied resource attribution; both fields are mandatory.
      properties:
        resource_id:
          type: string
          minLength: 1
          maxLength: 256
        resource_type:
          type: string
          minLength: 1
          maxLength: 256

    SubjectRef:
      type: object
      additionalProperties: false
      required: [subject_id]
      description: |
        Optional subject attribution. `subject_id` is mandatory when
        supplied; `subject_type` is optional. Never derived from the
        caller's `SecurityContext`.
      properties:
        subject_id:
          type: string
          minLength: 1
          maxLength: 256
        subject_type:
          type: string
          minLength: 1
          maxLength: 256

    UsageRecord:
      type: object
      additionalProperties: false
      required:
        - id
        - tenant_id
        - resource_ref
        - gts_id
        - value
        - created_at
        - idempotency_key
        - status
      description: |
        One accepted measurement. Immutable after acceptance except for
        the one-way `status` transition. `corrects_id` distinguishes a
        usage row (absent) from a counter compensation row (set).
      properties:
        id:
          type: string
          format: uuid
          description: Deterministic gateway-derived UUIDv5 of (tenant_id, gts_id, idempotency_key).
        tenant_id:
          type: string
          format: uuid
          description: Owning tenant for this record.
        resource_ref:
          $ref: "#/components/schemas/ResourceRef"
        subject_ref:
          $ref: "#/components/schemas/SubjectRef"
        gts_id:
          type: string
          minLength: 1
          maxLength: 512
          description: GTS instance id of the referenced usage type.
        value:
          $ref: "#/components/schemas/UsageValue"
        created_at:
          $ref: "#/components/schemas/Timestamp"
        idempotency_key:
          $ref: "#/components/schemas/IdempotencyKey"
        status:
          $ref: "#/components/schemas/UsageRecordStatus"
        corrects_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Optional reference to a prior usage row's `id`. Presence
            marks this record as a counter compensation row. The
            referenced row MUST itself have `corrects_id` absent, share
            the full identity tuple
            `(tenant_id, gts_id, resource_ref, subject_ref)`,
            and be `active`.
        metadata:
          $ref: "#/components/schemas/RecordMetadata"

    UsageRecordInput:
      type: object
      additionalProperties: false
      required:
        - tenant_id
        - resource_ref
        - gts_id
        - value
        - created_at
        - idempotency_key
      description: |
        Ingestion projection of `UsageRecord` — same shape minus
        `status` (server-defaulted to `active`) and minus the record
        identity: `id` is gateway-derived, never caller-supplied, and
        is rejected as an unknown field if present. The gateway
        computes it as a deterministic UUIDv5 of the dedup key:
        `id = UUIDv5(NS, tenant_id ⟨0x1F⟩ gts_id ⟨0x1F⟩ idempotency_key)`,
        where `NS` is the fixed namespace
        `56313026-863b-4de8-b32b-1f96b67306ed`. The caller supplies
        `created_at` on every submission. The same schema carries both
        ordinary usage and counter compensations; the server enforces
        the `(kind × corrects_id presence)` value matrix and
        `corrects_id` referential integrity at ingestion.
      properties:
        tenant_id:
          type: string
          format: uuid
        resource_ref:
          $ref: "#/components/schemas/ResourceRef"
        subject_ref:
          $ref: "#/components/schemas/SubjectRef"
        gts_id:
          type: string
          minLength: 1
          maxLength: 512
        value:
          $ref: "#/components/schemas/UsageValue"
        created_at:
          $ref: "#/components/schemas/Timestamp"
        idempotency_key:
          $ref: "#/components/schemas/IdempotencyKey"
        corrects_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Optional reference to a prior usage row's `id`. See
            `UsageRecord.corrects_id`.
        metadata:
          $ref: "#/components/schemas/RecordMetadata"

    IngestRecordsRequest:
      type: object
      additionalProperties: false
      required: [records]
      properties:
        records:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/UsageRecordInput"

    IngestRecordResult:
      type: object
      additionalProperties: false
      required: [outcome]
      description: Per-record acknowledgement; array preserves input order.
      properties:
        outcome:
          $ref: "#/components/schemas/IngestOutcome"
        id:
          type: string
          format: uuid
          description: Record id; present on `accepted` and `duplicate` (the gateway-derived `UsageRecord.id`).
        idempotency_key:
          $ref: "#/components/schemas/IdempotencyKey"
        error:
          $ref: "#/components/schemas/Problem"

    IngestRecordsResponse:
      type: object
      additionalProperties: false
      required: [results]
      properties:
        results:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/IngestRecordResult"

    Page_UsageRecord:
      type: object
      additionalProperties: false
      required: [items, page_info]
      description: Cursor-paginated page of usage records.
      properties:
        items:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/UsageRecord"
        page_info:
          $ref: "#/components/schemas/PageInfo"

    MetadataFilter:
      type: object
      additionalProperties: false
      required: [key, values]
      description: |
        Equality-set filter applied to a single `UsageRecord.metadata`
        key. Across a `metadata_filter` array: AND across distinct
        filters (different keys), OR within a single filter's `values`.
        An empty array imposes no metadata filter. Matches the SDK's
        `MetadataFilter` 1:1.
      properties:
        key:
          type: string
          minLength: 1
          description: |
            Validated metadata key (non-empty, no NUL bytes). MUST be a
            member of the queried usage type's `metadata_fields`.
        values:
          type: array
          minItems: 1
          description: Candidate value set; at least one entry.
          items:
            type: string

    AggregationSpec:
      type: object
      additionalProperties: false
      required: [op]
      description: |
        Aggregation specification: the function to compute (`op`) and
        the optional grouping (`group_by`). Matches the SDK's
        `AggregationSpec` wire shape; `group_by` is omitted on the wire
        when empty.
      properties:
        op:
          $ref: "#/components/schemas/AggregationFunction"
        group_by:
          type: array
          maxItems: 2
          uniqueItems: true
          description: |
            Ordered grouping dimensions. Omitted or empty for the
            no-grouping case, which yields a single bucket with no
            `key`. Capped at 2 dimensions.
          items:
            $ref: "#/components/schemas/GroupByDimension"

    AggregationRequest:
      type: object
      additionalProperties: false
      required: [gts_id, aggregation]
      description: |
        Aggregation request body. Mirrors the SDK's
        `query_aggregated_usage_records` parameters: `gts_id`
        + OData `filter` (parsed into `ODataQuery`, carrying the
        mandatory bounded `created_at` window) + typed `metadata_filter`
        (sidechannel for JSON-keyed values that OData cannot express)
        + `aggregation` (`AggregationSpec`). PDP-authorized scope is
        intersected with the supplied filter.
      properties:
        gts_id:
          type: string
          minLength: 1
          maxLength: 512
          description: GTS semantic id of the usage type to query. MUST end with `~`.
        filter:
          type: string
          description: |
            OData `$filter` expression over the SDK's
            `UsageRecordQuery` field set (`tenant_id`, `resource_id`,
            `resource_type`, `subject_id`, `subject_type`,
            `corrects_id`, `created_at`, `status`). The mandatory
            bounded `[from, to)` time window rides this filter as
            `created_at ge … and created_at lt …` conjuncts (at least
            one lower and one upper bound, else `MISSING_TIME_WINDOW`);
            `metadata_*` keys are filtered through `metadata_filter` and
            do not flow through OData.
        metadata_filter:
          type: array
          description: |
            Typed metadata filters. Each entry targets one declared
            metadata key; entries AND together, values within a single
            entry OR together.
          items:
            $ref: "#/components/schemas/MetadataFilter"
        aggregation:
          $ref: "#/components/schemas/AggregationSpec"

    AggregationBucket:
      type: object
      additionalProperties: false
      required: [value]
      description: |
        Single aggregated bucket. `key` carries the dimension values in
        `AggregationSpec.group_by` order; omitted when `group_by` was
        empty (the no-grouping case yields one bucket with no `key`).
        Matches the SDK's `AggregationBucket` wire shape.
      properties:
        key:
          type: array
          description: |
            Dimension key values in `group_by` order. Each entry is the
            string form of the corresponding dimension's value
            (`Uuid::to_string()` for `tenant_id`; the record's
            identifier/type string verbatim for `resource_id`,
            `resource_type`, `subject_id`, `subject_type`; the
            metadata value at the declared key for
            `{"metadata":"<key>"}`).
          items:
            type: string
        value:
          oneOf:
            - $ref: "#/components/schemas/AggregatedValue"
            - type: "null"
          description: |
            Aggregated value for the bucket. `null` when no rows
            matched (e.g. `min` over an empty set). Wire-encoded as a
            JSON string (see `AggregatedValue`); `avg` may carry a
            plugin-chosen rounding scale on non-terminating quotients.

    AggregationResult:
      type: object
      additionalProperties: false
      required: [buckets]
      description: |
        Aggregated-query result. A single bucket with no `key` (or an
        empty `key`) represents the no-grouping case. Matches the SDK's
        `AggregationResult` wire shape (`gts_id` and
        `aggregation` are caller-supplied request inputs and not
        echoed in the result).
      properties:
        buckets:
          type: array
          maxItems: 100000
          description: Result buckets in plugin-emitted order.
          items:
            $ref: "#/components/schemas/AggregationBucket"

    UsageType:
      type: object
      additionalProperties: false
      required:
        - gts_id
        - kind
        - metadata_fields
      description: Canonical UsageType catalog row.
      properties:
        gts_id:
          type: string
          minLength: 1
          maxLength: 512
          pattern: "~$"
          description: |
            GTS semantic id; MUST end with `~` and derive from
            `gts.cf.core.uc.usage_record.v1~`. Deployment-unique.
        kind:
          type: string
          enum: [counter, gauge]
          description: |
            Classification axis. `counter` accepts compensations;
            `gauge` rejects them.
        metadata_fields:
          type: array
          items:
            type: string
          uniqueItems: true
          description: |
            Closed list of metadata key names accepted for this usage
            type. Values are stringly-typed end-to-end. Every name here
            is admissible as a `$filter` operand on raw query and as a
            `group_by` operand on aggregation.

    UsageTypeList:
      type: object
      additionalProperties: false
      required: [items, page_info]
      description: Cursor-paginated list of usage-type catalog rows.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UsageType"
        page_info:
          $ref: "#/components/schemas/PageInfo"

    PageInfo:
      type: object
      additionalProperties: false
      required: [limit]
      description: Cursor-based pagination envelope.
      properties:
        next_cursor:
          type: string
          description: Opaque cursor for the next page. Omitted on the last page.
        prev_cursor:
          type: string
          description: Opaque cursor for the previous page. Omitted on the first page.
        limit:
          type: integer
          format: int64
          minimum: 1
          maximum: 1000
          description: Effective page size applied to this page.

    Problem:
      type: object
      additionalProperties: true
      required: [type, title, status, detail]
      description: |
        RFC 9457 problem+json envelope. `type` is a canonical-error
        category URI; `status` is the HTTP status; `context` is a
        per-category structured object. Discrimination layers (in order
        of granularity): `type` (broad category), `context.resource_type`
        (which entity), `context.field_violations[N].field`/`.reason`
        (per-field for `InvalidArgument`), or `context.reason` (carried
        natively only on `Aborted`, `PermissionDenied`,
        `Unauthenticated`). `context.retryable` is a retry-safety hint.
      properties:
        type:
          type: string
          format: uri-reference
          description: Canonical-error category URI.
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        trace_id:
          type: string
          description: W3C Trace Context `trace-id` for correlation.
        context:
          type: object
          additionalProperties: true
          description: |
            Per-category structured context. Common fields include
            `reason`, `retryable`, `retry_after_seconds`,
            `field_violations`, `resource_type`, and `resource_name`.
