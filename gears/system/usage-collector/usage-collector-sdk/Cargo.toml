[package]
name = "cf-gears-usage-collector-sdk"
description = "SDK for the usage-collector gear: contract surfaces (consumer SDK trait, storage Plugin SPI), domain models, GTS plugin spec, and error definitions"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
keywords = ["constructorfabric", "cf-gears"]
categories = ["api-bindings"]
metadata.docs.rs.all-features = true

[lib]
name = "usage_collector_sdk"

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true }
time = { workspace = true }
rust_decimal = { workspace = true, features = ["serde-with-str"] }
bigdecimal = { workspace = true }

# GTS types
gts = { workspace = true }
toolkit-gts = { workspace = true }

# Toolkit dependencies
toolkit = { workspace = true }
toolkit-security = { workspace = true }
toolkit-odata = { workspace = true }
toolkit-odata-macros = { workspace = true }
