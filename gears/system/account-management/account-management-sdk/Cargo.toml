[package]
name = "cf-gears-account-management-sdk"
version = "0.2.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Account Management SDK — public inter-module contracts (AccountManagementError, IdP provisioner client trait, tenant CRUD input/output shapes)"
repository.workspace = true
keywords = ["constructorfabric", "cf-gears"]
categories = ["web-programming"]
metadata.docs.rs.all-features = true

[lib]
name = "account_management_sdk"

[lints]
workspace = true

[dependencies]
# Per ADR 0005 the trait boundary is `CanonicalError`; the SDK ships
# `AccountManagementError` as an opt-in `From<CanonicalError>`
# projection (see src/error.rs). The single AIP-193 ladder
# (`From<DomainError> for CanonicalError`) lives in the impl crate's
# `infra::sdk_error_mapping`; this SDK depends on the canonical-errors
# crate to project that envelope into the typed view.
toolkit-canonical-errors = { workspace = true }
thiserror = { workspace = true }

# IdP provisioner contract (trait + DTO) consumed by AM and implemented
# by deployment-specific IdP plugins. Lives in the SDK so plugin authors
# depend on the thin contract crate, not on the full impl crate.
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
uuid = { workspace = true, features = ["serde"] }
# Typed wrapper for chained GTS schema identifiers carried by SDK
# inputs (`CreateChildInput.tenant_type`, `ProvisionRequest.tenant_type`).
# Wire shape stays a string; the type is a documentation +
# JSON-schema hint that the field is a chained `gts.X.v1~Y.v1~`
# identifier rather than an arbitrary string. AM-side consumers
# pass `&str` through `gts::GtsID::new` for full chain validation.
gts = { workspace = true }

# Tenant-resolver SDK is the canonical home for the public-facing
# `TenantInfo` / `TenantStatus` shapes (slim, no internal storage
# fields). AM's tenant CRUD output reuses these directly so the
# resolver and AM speak the same vocabulary on the public boundary.
tenant-resolver-sdk = { workspace = true }

# `IdpPluginClient::list_users` returns `toolkit_odata::Page<User>` —
# the same cursor-based pagination envelope already used by RG and
# tenant-resolver SDKs. AM is a transparent forwarder of the
# `Option<String>` cursor; the IdP plugin owns the cursor format
# (filter-hash consistency, sort-key stability — see
# `libs/toolkit-odata/src/pagination.rs`) or wraps a native vendor
# cursor (e.g. Zitadel `next_token`).
toolkit-odata = { workspace = true }

# `MetadataEntryQuery` derives `ODataFilterable` to generate the
# typed `FilterField` enum the impl-crate's repo layer uses with
# `toolkit_db::odata::paginate_odata`. Hard dep (not optional like
# RG SDK) because `AccountManagementClient::list_metadata` takes
# `&ODataQuery` — every consumer of the trait needs the filter
# field shapes.
toolkit-odata-macros = { workspace = true }

# `AccountManagementClient` (this SDK's inter-module trait) takes
# `&SecurityContext` on the tenant-CRUD methods (PEP-gated by the
# impl-side `TenantService::authorize` per DESIGN §4.2) and
# `&AccessScope` on the user-CRUD methods (caller pre-computes the
# scope until those services land their own PDP gate). Both types
# come from `toolkit-security`. RG SDK already follows this pattern
# (`ResourceGroupClient` methods accept `&SecurityContext`).
toolkit-security = { workspace = true }

# `toolkit-gts::gts_type_schema` powers compile-time validation for
# the `IdpPluginSpecV1` plugin-discovery type (mirrors
# `AuthNResolverPluginSpecV1` in `authn-resolver-sdk/src/gts.rs`).
# `toolkit` ships `PluginV1<P>` (re-exported from `toolkit-gts`);
# `schemars` is the runtime JSON-Schema reflection backend the
# macro generates code against.
gts-macros = { workspace = true }
toolkit = { workspace = true }
toolkit-gts = { workspace = true }
schemars = { workspace = true }

# `time` carries `MetadataEntry::updated_at` in the metadata SDK
# module. The workspace pin already enables `serde` / `formatting` /
# `parsing`; we additionally request `serde-well-known` so the field
# wire-serialises as RFC 3339 (the default `time` serde format is a
# tuple, which would leak into every public metadata response body).
# `macros` is requested so unit tests can spell timestamps with
# `time::macros::datetime!`.
time = { workspace = true, features = ["serde-well-known", "macros"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
