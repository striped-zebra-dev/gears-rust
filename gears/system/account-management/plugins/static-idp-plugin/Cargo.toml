[package]
name = "cf-gears-static-idp-plugin"
version = "0.1.1"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Permissive echo IdP plugin for Account Management dev and E2E stacks"
repository.workspace = true
keywords = ["constructorfabric", "cf-gears"]
categories = ["authentication"]
metadata.docs.rs.all-features = true

[lib]
name = "static_idp_plugin"

[lints]
workspace = true

[dependencies]
# Consumed SDK trait boundaries are `CanonicalError` (ADR 0005).
toolkit-canonical-errors = { workspace = true }
# Local dependencies
account-management-sdk = { package = "cf-gears-account-management-sdk", version = "0.2.0", path = "../../account-management-sdk" }
types-registry-sdk = { package = "cf-gears-types-registry-sdk", version = "0.3.0", path = "../../../types-registry/types-registry-sdk" }

# ToolKit dependencies
toolkit = { workspace = true }
toolkit-macros = { workspace = true }
toolkit-odata = { workspace = true }
toolkit-security = { workspace = true }

# Async runtime
async-trait = { workspace = true }

# Data structures
uuid = { workspace = true }

# Error handling
anyhow = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Logging
tracing = { workspace = true }

# Sync primitives for the in-memory user store
parking_lot = { workspace = true }

# Required by toolkit::gear macro
inventory = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }
# `IdpTenantContext::new` requires a `GtsSchemaId`; the test scaffolding
# in `domain::client::pagination_tests` builds a sample context per
# request. Dev-only so the runtime crate stays free of the dependency.
gts = { workspace = true }
