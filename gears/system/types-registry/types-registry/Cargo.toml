[package]
name = "cf-gears-types-registry"
version = "0.1.23"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Types Registry gear: GTS entity registration, storage, and REST API"
repository.workspace = true
readme = "README.md"
keywords = ["constructorfabric", "cf-gears"]
categories = ["development-tools"]
metadata.docs.rs.all-features = true

[lints]
workspace = true

[lib]
name = "types_registry"
doctest = false

[dependencies]
# SDK - public API, models, and errors
types-registry-sdk = { package = "cf-gears-types-registry-sdk", version = "0.3.0", path = "../types-registry-sdk" }

# GTS types (from git dependency)
gts = { workspace = true }

# Core dependencies
anyhow = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
inventory = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
utoipa = { workspace = true }
axum = { workspace = true, features = ["macros"] }
uuid = { workspace = true, features = ["v5"] }
thiserror = { workspace = true }
parking_lot = { workspace = true }
lru = "0.17"

# Local dependencies
toolkit = { workspace = true }
toolkit-canonical-errors = { workspace = true, features = ["axum"] }
toolkit-gts = { workspace = true }
toolkit-macros = { workspace = true }
toolkit-utils = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
