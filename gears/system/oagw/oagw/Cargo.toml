[package]
name = "cf-gears-oagw"
description = "OAGW module - discovers and routes to plugins"
version = "0.2.27"
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
readme = "README.md"
keywords = ["constructorfabric", "cf-gears"]
categories = ["web-programming"]
metadata.docs.rs.all-features = true

[lib]
name = "oagw"
path = "src/lib.rs"

[features]
# FIPS-140-3: compile TLS deps with FIPS-approved cipher suites only
fips = ["toolkit-http/fips"]
test-utils = [
    "axum/ws",
    "toolkit/bootstrap",
    "dep:async-stream",
    "dep:tower",
    "dep:rustls",
    "dep:rustls-pki-types",
    "dep:rcgen",
    "tokio/net",
    "tokio/sync",
    "tokio/rt",
]

[dependencies]
oagw-sdk = { path = "../oagw-sdk", package="cf-gears-oagw-sdk", version = "0.5.3", features = ["axum"] }
toolkit = { workspace = true }
toolkit-auth = { workspace = true }
toolkit-canonical-errors = { workspace = true, features = ["axum"] }
toolkit-http = { workspace = true }
toolkit-security = { workspace = true }
toolkit-macros = { workspace = true }
inventory = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true }
http = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }
bytes = { workspace = true }
arc-swap = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
gts = { workspace = true }
utoipa = { workspace = true }
types-registry-sdk = { workspace = true }
authz-resolver-sdk = { workspace = true }
tenant-resolver-sdk = { workspace = true }
credstore-sdk = { workspace = true }
# Metrics / OpenTelemetry
opentelemetry = { workspace = true }
heck = { workspace = true }
# CP deps
dashmap = { workspace = true }
parking_lot = { workspace = true }
psl = { workspace = true }
thiserror = { workspace = true }
mime = { workspace = true }
# DP deps
form_urlencoded = "1"
pingora-memory-cache = "0.8"
futures-util = { workspace = true, features = ["sink"] }
tokio = { workspace = true, features = ["time"] }
hyper = { workspace = true }
hyper-util = { workspace = true }
# Pingora proxy engine
pingora-proxy = { version = "0.8", features = ["rustls"] }
pingora-core = { version = "0.8", features = ["rustls"] }
pingora-load-balancing = { version = "0.8", features = ["rustls"] }
pingora-http = { version = "0.8.1" }
httparse = "1"
# test-utils optional deps
async-stream = { workspace = true, optional = true }
tower = { workspace = true, features = ["util"], optional = true }
rustls = { workspace = true, optional = true }
rustls-pki-types = { workspace = true, optional = true }
rcgen = { workspace = true, optional = true }

[dev-dependencies]
cf-gears-oagw = { path = ".", features = ["test-utils"] }
toolkit = { workspace = true, features = ["bootstrap"] }
opentelemetry_sdk = { workspace = true, features = ["testing"] }
types-registry-sdk = { workspace = true, features = ["test-util"] }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "time", "net"] }
tower = { workspace = true, features = ["util"] }
hyper = { workspace = true }
hyper-util = { workspace = true }
http-body-util = { workspace = true }
async-trait = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
httpmock = { workspace = true }
tokio-rustls = { workspace = true }
rustls = { workspace = true }
futures-util = { workspace = true }
