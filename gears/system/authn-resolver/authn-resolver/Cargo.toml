[package]
name = "cf-gears-authn-resolver"
version = "0.2.18"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "AuthN resolver gear - discovers and routes to plugins"
repository.workspace = true
readme = "README.md"
keywords = ["constructorfabric", "cf-gears"]
categories = ["authentication"]
metadata.docs.rs.all-features = true

[lib]
name = "authn_resolver"

[lints]
workspace = true

[dependencies]
# Trait boundaries of consumed SDKs are `CanonicalError` (ADR 0005).
toolkit-canonical-errors = { workspace = true }
# Local dependencies
authn-resolver-sdk = { package = "cf-gears-authn-resolver-sdk", version = "0.3.18", path = "../authn-resolver-sdk" }
types-registry-sdk = { package = "cf-gears-types-registry-sdk", version = "0.3.0", path = "../../types-registry/types-registry-sdk" }

# ToolKit dependencies
toolkit = { workspace = true }
toolkit-macros = { workspace = true }

# Async runtime
async-trait = { workspace = true }

# Error handling and serialization
anyhow = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Required by toolkit::gear macro
inventory = { workspace = true }

# Logging
tracing = { workspace = true }
