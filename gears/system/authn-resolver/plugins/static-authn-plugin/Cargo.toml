[package]
name = "cf-gears-static-authn-plugin"
version = "0.3.1"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "AuthN resolver plugin with static token-to-identity mapping for development and testing"
repository.workspace = true
readme = "README.md"
keywords = ["constructorfabric", "cf-gears"]
categories = ["authentication"]
metadata.docs.rs.all-features = true

[lib]
name = "static_authn_plugin"

[lints]
workspace = true

[dependencies]
# Local dependencies
authn-resolver-sdk = { package = "cf-gears-authn-resolver-sdk", version = "0.3.18", path = "../../authn-resolver-sdk" }
types-registry-sdk = { package = "cf-gears-types-registry-sdk", version = "0.3.0", path = "../../../types-registry/types-registry-sdk" }

# ToolKit dependencies
toolkit = { workspace = true }
toolkit-macros = { workspace = true }
toolkit-security = { workspace = true }

# Async runtime
async-trait = { workspace = true }

# Data structures
uuid = { workspace = true }

# Error handling
anyhow = { workspace = true }

# Serialization
serde = { workspace = true }

# Logging
tracing = { workspace = true }

# Secrets
secrecy = { workspace = true }

# Required by toolkit::gear macro
inventory = { workspace = true }

[dev-dependencies]
secrecy = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros"] }
