[package]
name = "cf-gears-static-authz-plugin"
version = "0.1.21"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "AuthZ resolver plugin with static tenant-scoped policy for development and testing"
repository.workspace = true
readme = "README.md"
keywords = ["constructorfabric", "cf-gears", "authorization"]
categories = ["authentication"]
metadata.docs.rs.all-features = true

[lib]
name = "static_authz_plugin"

[lints]
workspace = true

[dependencies]
# Local dependencies
authz-resolver-sdk = { package = "cf-gears-authz-resolver-sdk", version = "0.3.9", path = "../../authz-resolver-sdk" }
types-registry-sdk = { package = "cf-gears-types-registry-sdk", version = "0.3.0", path = "../../../types-registry/types-registry-sdk" }

# ToolKit dependencies
toolkit = { workspace = true }
toolkit-macros = { workspace = true }
toolkit-security = { workspace = true }

# Async runtime
async-trait = { workspace = true }

# Data structures
uuid = { workspace = true }

# Error handling
anyhow = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Logging
tracing = { workspace = true }

# Required by toolkit::gear macro
inventory = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }
