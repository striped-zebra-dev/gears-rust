[package]
name = "cf-gears-rg-tr-plugin"
version = "0.1.4"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Tenant resolver plugin with RG hierarchy resolution"
repository.workspace = true
readme = "README.md"
keywords = ["constructorfabric", "cf-gears", "tenant-resolver"]
categories = ["authentication"]
metadata.docs.rs.all-features = true

[lib]
name = "rg_tr_plugin"

[lints]
workspace = true

[dependencies]
# Local dependencies
tenant-resolver-sdk = { package = "cf-gears-tenant-resolver-sdk", version = "0.3.9", path = "../../tenant-resolver-sdk" }
resource-group-sdk = { package = "cf-gears-resource-group-sdk", version = "0.2.0", path = "../../../resource-group/resource-group-sdk" }
types-registry-sdk = { package = "cf-gears-types-registry-sdk", version = "0.3.0", path = "../../../types-registry/types-registry-sdk" }

# ToolKit dependencies
toolkit = { workspace = true }
toolkit-macros = { workspace = true }
toolkit-security = { workspace = true }
toolkit-odata = { workspace = true }

# Async runtime
async-trait = { workspace = true }

# Data structures
uuid = { workspace = true }

# Error handling
anyhow = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Logging
tracing = { workspace = true }

# Required by toolkit::gear macro
inventory = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }
# Test fakes synthesize the `CanonicalError` envelope the RG trait now
# returns (ADR 0005). Production code only projects it via the SDK's
# `ResourceGroupError::from`, so this is dev-only.
toolkit-canonical-errors = { workspace = true }
