[package]
name = "cf-gears-static-tr-plugin"
version = "0.1.22"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Tenant resolver plugin with static config-based tenant data and access rules"
repository.workspace = true
readme = "README.md"
keywords = ["constructorfabric", "cf-gears"]
categories = ["web-programming"]
metadata.docs.rs.all-features = true

[lib]
name = "static_tr_plugin"

[lints]
workspace = true

[dependencies]
# Local dependencies
tenant-resolver-sdk = { package = "cf-gears-tenant-resolver-sdk", version = "0.3.9", path = "../../tenant-resolver-sdk" }
types-registry-sdk = { package = "cf-gears-types-registry-sdk", version = "0.3.0", path = "../../../types-registry/types-registry-sdk" }

# ToolKit dependencies
toolkit = { workspace = true }
toolkit-macros = { workspace = true }
toolkit-security = { workspace = true }

# Async runtime
async-trait = { workspace = true }

# Data structures
uuid = { workspace = true }

# Error handling
anyhow = { workspace = true }

# Serialization
serde = { workspace = true }

# Logging
tracing = { workspace = true }

# Required by toolkit::gear macro
inventory = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }
