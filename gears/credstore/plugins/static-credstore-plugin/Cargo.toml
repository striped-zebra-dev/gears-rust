[package]
name = "cf-gears-static-credstore-plugin"
version = "0.1.19"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "CredStore plugin with static secret mapping for development and testing"
repository.workspace = true
keywords = ["constructorfabric", "cf-gears"]
metadata.docs.rs.all-features = true

[lib]
name = "static_credstore_plugin"

[lints]
workspace = true

[dependencies]
# Local dependencies
credstore-sdk = { package = "cf-gears-credstore-sdk", version = "0.1.26", path = "../../credstore-sdk" }
types-registry-sdk = { package = "cf-gears-types-registry-sdk", version = "0.3.0", path = "../../../system/types-registry/types-registry-sdk" }

# ToolKit dependencies
toolkit = { workspace = true }
toolkit-macros = { workspace = true }
toolkit-security = { workspace = true }

# Async runtime
async-trait = { workspace = true }

# Data structures
uuid = { workspace = true }

# Error handling
anyhow = { workspace = true }

# Serialization
serde = { workspace = true }

# Logging
tracing = { workspace = true }

# Required by toolkit::gear macro
inventory = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }
serde-saphyr = { workspace = true }
