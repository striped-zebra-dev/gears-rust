# Updated: 2026-04-16 by Constructor Tech
[workspace.package]
edition = "2024"
license = "Apache-2.0"
authors = ["Constructor Fabric"]
repository = "https://github.com/constructorfabric/gears-rust"
description = "CF/Gears Server Example"
rust-version = "1.95.0"
readme = "README.md"

[profile.dev]
incremental = false
codegen-units = 16

[profile.test]
incremental = false
codegen-units = 16

[profile.release]
codegen-units = 1
panic = "unwind"
debug = "line-tables-only"

[workspace]
members = [
    "apps/cf-gears-example-server",
    "tools/gts-analyze",
    "tools/xtask",
    "libs/toolkit",
    "libs/toolkit-macros",
    "libs/toolkit-macros-tests",
    "libs/toolkit-db",
    "libs/toolkit-db-macros",
    "libs/toolkit-auth",
    "libs/toolkit-canonical-errors",
    "libs/toolkit-canonical-errors-macro",
    "libs/toolkit-gts",
    "libs/toolkit-gts-macros",
    "libs/toolkit-http",
    "libs/toolkit-http-middleware",
    "libs/toolkit-sdk",
    "libs/toolkit-odata-macros",
    "libs/toolkit-security",
    "libs/toolkit-odata",
    "libs/toolkit-node-info",
    "libs/toolkit-transport-grpc",
    "libs/toolkit-utils",
    "libs/rustls-corecrypto-provider",
    "libs/rustls-fips-shim",
    "libs/system-sdks",
    "libs/system-sdks/sdks/directory",
    "gears/credstore/credstore-sdk",
    "gears/credstore/credstore",
    "gears/credstore/plugins/static-credstore-plugin",
    "gears/file-parser",
    "gears/file-storage/file-storage-sdk",
    "gears/file-storage/file-storage",
    "gears/system/account-management/account-management",
    "gears/system/account-management/account-management-sdk",
    "gears/system/account-management/plugins/static-idp-plugin",
    "gears/system/api-gateway",
    "gears/system/grpc-hub",
    "gears/system/nodes-registry/nodes-registry",
    "gears/system/nodes-registry/nodes-registry-sdk",
    "gears/system/resource-group/resource-group-sdk",
    "gears/system/resource-group/resource-group",
    "gears/system/gear-orchestrator",
    "examples/toolkit/users-info/users-info-sdk",
    "examples/toolkit/users-info/users-info",
    "examples/toolkit/users-info/users-info-server",
    "examples/oop-gears/calculator-gateway/calculator-gateway-sdk",
    "examples/oop-gears/calculator-gateway/calculator-gateway",
    "examples/oop-gears/calculator/calculator-sdk",
    "examples/oop-gears/calculator/calculator",
    "examples/cf-gears-fips-probe",
    "gears/system/types-registry/types-registry-sdk",
    "gears/system/types-registry/types-registry",
    "gears/simple-user-settings/simple-user-settings-sdk",
    "gears/simple-user-settings/simple-user-settings",
    "gears/system/tenant-resolver/tenant-resolver-sdk",
    "gears/system/tenant-resolver/tenant-resolver",
    "gears/system/tenant-resolver/plugins/static-tr-plugin",
    "gears/system/tenant-resolver/plugins/single-tenant-tr-plugin",
    "gears/system/tenant-resolver/plugins/rg-tr-plugin",
    "gears/system/authn-resolver/authn-resolver-sdk",
    "gears/system/authn-resolver/authn-resolver",
    "gears/system/authn-resolver/plugins/static-authn-plugin",
    "gears/system/authn-resolver/plugins/oidc-authn-plugin",
    "gears/system/authz-resolver/authz-resolver-sdk",
    "gears/system/authz-resolver/authz-resolver",
