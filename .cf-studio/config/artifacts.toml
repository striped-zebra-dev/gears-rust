[[systems]]
name = "cf-gears"
slug = "cf"
kit = "gears"

[[systems.autodetect]]
kit = "gears"
system_root = "{project_root}/gears/$system"
artifacts_root = "{system_root}/docs"

[systems.autodetect.artifacts]
[systems.autodetect.artifacts.PRD]
pattern = "PRD.md"
traceability = "FULL"
required = true

[systems.autodetect.artifacts.DESIGN]
pattern = "DESIGN.md"
traceability = "FULL"
required = true

[systems.autodetect.artifacts.ADR]
pattern = "ADR/*.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.DECOMPOSITION]
pattern = "DECOMPOSITION.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.FEATURE]
pattern = "features/*.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.UPSTREAM_REQS]
pattern = "UPSTREAM_REQS.md"
traceability = "DOCS-ONLY"
required = false

[systems.autodetect.validation]
require_kind_registered_in_kit = true
require_md_extension = true
fail_on_unmatched_markdown = true

[[systems.autodetect.codebase]]
name = "Gears"
path = "{system_root}/src"
extensions = [".rs"]

[[systems.autodetect.codebase]]
name = "Tests"
path = "{system_root}/tests"
extensions = [".rs"]

[[systems.autodetect]]
kit = "gears"
system_root = "{project_root}/gears/system/$system"
artifacts_root = "{system_root}/docs"

[systems.autodetect.artifacts]
[systems.autodetect.artifacts.PRD]
pattern = "PRD.md"
traceability = "FULL"
required = true

[systems.autodetect.artifacts.DESIGN]
pattern = "DESIGN.md"
traceability = "FULL"
required = true

[systems.autodetect.artifacts.ADR]
pattern = "ADR/*.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.DECOMPOSITION]
pattern = "DECOMPOSITION.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.FEATURE]
pattern = "features/*.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.UPSTREAM_REQS]
pattern = "UPSTREAM_REQS.md"
traceability = "DOCS-ONLY"
required = false

[systems.autodetect.validation]
require_kind_registered_in_kit = true
require_md_extension = true
# fail_on_unmatched_markdown is disabled at this scope because children autodetect rules
# (e.g. account-management/docs/tr-plugin) do not carve their paths out of the parent's
# unmatched-markdown walk, so tightening this would flag legitimate sub-plugin artifacts
# as unmatched.
#
# Known trade-off: because this autodetect block matches every gears/system/$system
# (oagw, resource-group, account-management, and any future sibling), setting this flag
# to `false` here also disables unmatched-markdown detection across every other
# gears/system/* subtree — not only account-management. Strictness is retained on each
# child scope (see the tr-plugin child below, which keeps fail_on_unmatched_markdown = true).
#
# Do NOT tighten this flag without first introducing a per-path carve-out mechanism for
# the tr-plugin-style sub-plugin case; otherwise the legitimate sub-plugin artifacts will
# re-surface as unmatched-markdown failures for every module that ships nested artifacts.
fail_on_unmatched_markdown = false

[[systems.autodetect.codebase]]
name = "Gears"
path = "{system_root}/src"
extensions = [".rs"]

[[systems.autodetect.codebase]]
name = "Tests"
path = "{system_root}/tests"
extensions = [".rs"]

[[systems.autodetect.codebase]]
name = "Nested Gears"
path = "{system_root}/{system}/src"
extensions = [".rs"]

[[systems.autodetect.codebase]]
name = "Nested Tests"
path = "{system_root}/{system}/tests"
extensions = [".rs"]

[[systems.autodetect.codebase]]
name = "Nested SDK"
path = "{system_root}/{system}-sdk/src"
extensions = [".rs"]

# Nested sub-plugin scope: account-management/docs/tr-plugin/ carries its own PRD/DESIGN/ADR.
# Declared as a child of the `gears/system/$system` autodetect rule so the sub-plugin
# artifacts are detected as belonging to tr-plugin, not to account-management.
[[systems.autodetect.children]]
kit = "gears"
system_root = "{project_root}/gears/system/account-management/docs/tr-plugin"
artifacts_root = "{system_root}"

[systems.autodetect.children.artifacts]
[systems.autodetect.children.artifacts.PRD]
pattern = "PRD.md"
traceability = "DOCS-ONLY"
required = false

[systems.autodetect.children.artifacts.DESIGN]
pattern = "DESIGN.md"
traceability = "DOCS-ONLY"
required = false

[systems.autodetect.children.artifacts.ADR]
pattern = "ADR/*.md"
traceability = "DOCS-ONLY"
required = false

[systems.autodetect.children.artifacts.DECOMPOSITION]
pattern = "DECOMPOSITION.md"
traceability = "DOCS-ONLY"
required = false

[systems.autodetect.children.artifacts.FEATURE]
pattern = "features/*.md"
traceability = "DOCS-ONLY"
required = false

[systems.autodetect.children.validation]
require_kind_registered_in_kit = true
require_md_extension = true
fail_on_unmatched_markdown = true

# Nested sub-plugin scope: OIDC AuthN plugin carries its own PRD/DESIGN/DECOMPOSITION
# under gears/system/authn-resolver/plugins/oidc-authn-plugin/docs.
[[systems.autodetect.children]]
kit = "gears"
system_root = "{project_root}/gears/system/authn-resolver/plugins/oidc-authn-plugin/docs"
artifacts_root = "{system_root}"

[systems.autodetect.children.artifacts]
[systems.autodetect.children.artifacts.PRD]
